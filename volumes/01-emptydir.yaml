 #emptyDir -> this is the default storage allocated in the host until pod lives. 
 #            when you have multiple containers in a pod that should have access to same storage.


apiVersion: v1
kind: Pod
metadata:
 name: empty-dir-demo
 namespace: default
spec:
  containers:
  - name: nginx
    image: nginx 
    volumeMounts:
    - mountPath: /var/log/nginx
      name: nginx-logs

  - name: almalinux
    image: almalinux:9
    command: ["sleep", "1000"]
    volumeMounts:
    - mountPath: /mnt/nginx-log
      name: nginx-logs
      readOnly: true

  volumes:
  - name: nginx-logs
    emptyDir:
      sizeLimit: 100Mi